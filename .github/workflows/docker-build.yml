name: 🐳 Build and Push Docker Image to ECR

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: tx01-nginx

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔐 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: 🐳 Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd docker
          # Build image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          
          # Push SHA tag (ignore if already exists due to immutability)
          if docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG 2>&1 | tee /tmp/push-sha.log; then
            echo "✅ SHA tag pushed: $IMAGE_TAG"
          else
            if grep -q "tag is immutable" /tmp/push-sha.log; then
              echo "ℹ️ SHA tag already exists (immutable), skipping"
            else
              echo "❌ Failed to push SHA tag"
              exit 1
            fi
          fi
          
          # Push latest tag (always succeeds as it's mutable)
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "✅ Latest image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: 🔄 Trigger EC2 update (optional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          echo "📢 New image available with tag: latest"
          echo "EC2 instances will pull on next check or manual restart"
          
          # List EC2 instances that need update
          INSTANCES=$(aws ec2 describe-instances \
            --region $AWS_REGION \
            --filters "Name=tag:Project,Values=tx01" "Name=instance-state-name,Values=running" \
            --query 'Reservations[*].Instances[*].[InstanceId,Tags[?Key==`Name`].Value|[0]]' \
            --output text)
          
          if [ -n "$INSTANCES" ]; then
            echo "🎯 Running instances that can be updated:"
            echo "$INSTANCES"
            echo ""
            echo "💡 To update containers, run:"
            echo "   aws ssm send-command --instance-ids <ID> --document-name 'AWS-RunShellScript' --parameters 'commands=[\"docker pull \$(aws ecr describe-repositories --repository-names tx01-nginx --query repositories[0].repositoryUri --output text):latest && docker restart tx01-nginx\"]'"
          else
            echo "ℹ️ No running EC2 instances found"
          fi
