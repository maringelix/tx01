name: 🏗️ Terraform Bootstrap (S3 + DynamoDB)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.0

permissions:
  contents: read
  id-token: write

jobs:
  bootstrap:
    name: Bootstrap Backend - ${{ inputs.action }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🔑 AWS Credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📦 Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 🔐 Terraform Init
        run: terraform init
        working-directory: terraform/bootstrap

      - name: 📋 Terraform Validate
        run: terraform validate
        working-directory: terraform/bootstrap

      - name: 📊 Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -out=tfplan -no-color
        working-directory: terraform/bootstrap

      - name: 📝 Show Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform show tfplan
        working-directory: terraform/bootstrap

      - name: ✅ Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan
        working-directory: terraform/bootstrap

      - name: 🗑️ Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve
        working-directory: terraform/bootstrap

      - name: 📤 Output Results
        if: inputs.action == 'apply'
        run: terraform output
        working-directory: terraform/bootstrap

      - name: � Configure S3 Bucket for AWS Backup
        if: inputs.action == 'apply'
        run: |
          BUCKET_NAME="tx01-terraform-state-maringelix-2025"
          
          echo "Configuring S3 bucket tags for AWS Backup compatibility..."
          
          # Ensure bucket has proper tags for backup selection
          # The bucket might have been created by Terraform, but we ensure tags are correct
          aws s3api put-bucket-tagging \
            --bucket $BUCKET_NAME \
            --tagging "TagSet=[
              {Key=Project,Value=tx01},
              {Key=Environment,Value=stg},
              {Key=ManagedBy,Value=Terraform},
              {Key=Name,Value=$BUCKET_NAME},
              {Key=BackupEnabled,Value=true}
            ]" || echo "⚠️ Could not update bucket tags (bucket might not exist yet)"
          
          echo "✅ S3 bucket configured for AWS Backup"

      - name: 🔐 Configure DynamoDB Table for AWS Backup
        if: inputs.action == 'apply'
        run: |
          TABLE_NAME="tx01-terraform-state-maringelix-2025-locks"
          
          echo "Configuring DynamoDB table tags for AWS Backup..."
          
          # Get table ARN
          TABLE_ARN=$(aws dynamodb describe-table \
            --table-name $TABLE_NAME \
            --query 'Table.TableArn' \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$TABLE_ARN" ]; then
            aws dynamodb tag-resource \
              --resource-arn $TABLE_ARN \
              --tags \
                Key=Project,Value=tx01 \
                Key=Environment,Value=stg \
                Key=BackupEnabled,Value=true
            echo "✅ DynamoDB table configured for AWS Backup"
          else
            echo "⚠️ DynamoDB table not found yet"
          fi

      - name: 📋 Summary
        if: inputs.action == 'apply'
        run: |
          echo "## ✅ Bootstrap Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** tx01-terraform-state-maringelix-2025" >> $GITHUB_STEP_SUMMARY
          echo "**DynamoDB Table:** tx01-terraform-state-maringelix-2025-locks" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** us-east-1" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔐 Backup Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ S3 bucket tagged with \`BackupEnabled=true\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ DynamoDB table tagged with \`BackupEnabled=true\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Tags configured for AWS Backup selection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. ✨ Run the workflow \`Configure Backup Automation\` to enable backups" >> $GITHUB_STEP_SUMMARY
          echo "2. 🚀 Run the workflow de deploy to provision infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**💡 Tip:** The S3 backend is ready for AWS Backup with all required tags." >> $GITHUB_STEP_SUMMARY
