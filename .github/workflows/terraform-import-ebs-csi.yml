name: 🔧 Terraform Import EBS CSI Driver

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - stg
          - prd

env:
  AWS_REGION: us-east-1

permissions:
  contents: read
  id-token: write

jobs:
  terraform-import:
    name: 📦 Import EBS CSI Driver to Terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: 🔧 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🏗️ Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.5.0
      
      - name: 🔑 Get Account and OIDC Info
        id: info
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          OIDC_ID=$(aws eks describe-cluster \
            --name tx01-eks-${{ github.event.inputs.environment }} \
            --region ${{ env.AWS_REGION }} \
            --query 'cluster.identity.oidc.issuer' \
            --output text | cut -d '/' -f 5)
          
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "oidc_id=$OIDC_ID" >> $GITHUB_OUTPUT
          
          echo "✅ Account ID: $ACCOUNT_ID"
          echo "✅ OIDC ID: $OIDC_ID"
      
      - name: 🔄 Terraform Init
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: |
          terraform init
      
      - name: 📦 Import OIDC Provider
        working-directory: terraform/${{ github.event.inputs.environment }}
        continue-on-error: true
        run: |
          echo "🔑 Importing OIDC Provider..."
          terraform import \
            "module.infrastructure.aws_iam_openid_connect_provider.eks[0]" \
            "arn:aws:iam::${{ steps.info.outputs.account_id }}:oidc-provider/oidc.eks.us-east-1.amazonaws.com/id/${{ steps.info.outputs.oidc_id }}" \
            || echo "⚠️ OIDC Provider already imported or doesn't exist"
      
      - name: 📦 Import IAM Role
        working-directory: terraform/${{ github.event.inputs.environment }}
        continue-on-error: true
        run: |
          echo "🔐 Importing IAM Role..."
          terraform import \
            'module.infrastructure.aws_iam_role.ebs_csi_driver[0]' \
            tx01-eks-ebs-csi-driver \
            || echo "⚠️ IAM Role already imported or doesn't exist"
      
      - name: 📦 Import IAM Policy Attachment
        working-directory: terraform/${{ github.event.inputs.environment }}
        continue-on-error: true
        run: |
          echo "📋 Importing IAM Policy Attachment..."
          terraform import \
            'module.infrastructure.aws_iam_role_policy_attachment.ebs_csi_driver_policy[0]' \
            tx01-eks-ebs-csi-driver/arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy \
            || echo "⚠️ Policy Attachment already imported or doesn't exist"
      
      - name: 📦 Import EBS CSI Driver Addon
        working-directory: terraform/${{ github.event.inputs.environment }}
        continue-on-error: true
        run: |
          echo "📦 Importing EBS CSI Driver addon..."
          terraform import \
            'module.infrastructure.aws_eks_addon.ebs_csi_driver[0]' \
            tx01-eks-${{ github.event.inputs.environment }}:aws-ebs-csi-driver \
            || echo "⚠️ EBS CSI Driver addon already imported or doesn't exist"
      
      - name: 🔍 Debug - Check State Before Verify
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: |
          echo "🔍 Current state resources:"
          terraform state list || echo "No resources in state yet"
          echo ""
          echo "🔍 Checking if imports were successful:"
          terraform state show 'module.infrastructure.aws_iam_openid_connect_provider.eks[0]' 2>&1 | head -n 5 || echo "OIDC not in state"
          terraform state show 'module.infrastructure.aws_iam_role.ebs_csi_driver[0]' 2>&1 | head -n 5 || echo "IAM Role not in state"
      
      - name: 🔍 Verify Import
        working-directory: terraform/${{ github.event.inputs.environment }}
        continue-on-error: true
        run: |
          echo "🔍 Running terraform plan to verify..."
          terraform plan -no-color 2>&1 || echo "⚠️ Plan had issues, but continuing..."
      
      - name: 📊 Show State
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: |
          echo "📊 All resources in state:"
          terraform state list
          echo ""
          echo "📦 EBS CSI and OIDC resources:"
          terraform state list | grep -E "ebs_csi|oidc" || echo "⚠️ No EBS CSI or OIDC resources found yet"
      
      - name: 🎯 Summary
        run: |
          echo "## ✅ Import Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Environment: **${{ github.event.inputs.environment }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Imported:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ OIDC Provider" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ IAM Role (ebs-csi-driver)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ IAM Policy Attachment" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ EBS CSI Driver Addon" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the Terraform plan output above" >> $GITHUB_STEP_SUMMARY
          echo "2. If everything looks good, resources are now managed by Terraform" >> $GITHUB_STEP_SUMMARY
          echo "3. Future changes should be made via Terraform" >> $GITHUB_STEP_SUMMARY
