name: 🗑️ Destroy AWS Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - stg
          - prd
      confirmation:
        description: 'Type "DESTROY" to confirm complete destruction'
        required: true
        type: string
      preserve_ecr_images:
        description: 'Preserve ECR images (keep Docker images)'
        required: false
        type: boolean
        default: false
      destroy_bootstrap:
        description: '⚠️ ALSO DESTROY BOOTSTRAP (S3 + DynamoDB) - CANNOT BE RECOVERED! ⚠️'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.6.0'

permissions:
  contents: read
  id-token: write

jobs:
  validate-confirmation:
    name: ✅ Validate Destruction Request
    runs-on: ubuntu-latest
    steps:
      - name: 🔒 Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DESTROY" ]; then
            echo "❌ ERROR: Confirmation word must be exactly 'DESTROY'"
            echo "   You entered: '${{ github.event.inputs.confirmation }}'"
            exit 1
          fi
          echo "✅ Confirmation validated"
      
      - name: 📋 Show Destruction Plan
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🗑️  COMPLETE ENVIRONMENT DESTRUCTION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo ""
          echo "Will destroy:"
          echo "  ✓ EKS Cluster (tx01-eks-${{ github.event.inputs.environment }})"
          echo "  ✓ RDS Database (tx01-db-${{ github.event.inputs.environment }})"
          echo "  ✓ Application Load Balancers"
          echo "  ✓ NAT Gateways"
          echo "  ✓ VPC and all networking"
          echo "  ✓ EC2 Instances"
          echo "  ✓ EBS Volumes"
          echo "  ✓ Security Groups"
          echo "  ✓ IAM Roles (EKS-related)"
          if [ "${{ github.event.inputs.preserve_ecr_images }}" = "false" ]; then
            echo "  ✓ ECR Repositories and Images"
          fi
          echo ""
          echo "Will PRESERVE:"
          echo "  ✓ S3 Terraform State Bucket"
          echo "  ✓ DynamoDB State Lock Table"
          if [ "${{ github.event.inputs.preserve_ecr_images }}" = "true" ]; then
            echo "  ✓ ECR Images"
          fi
          echo ""
          echo "⚠️  THIS ACTION CANNOT BE UNDONE!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  destroy-backup-infrastructure:
    name: 🗑️ Destroy AWS Backup Infrastructure
    needs: validate-confirmation
    runs-on: ubuntu-latest
    steps:
      - name: 🔧 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🗑️ List Backup Resources (Before)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 AWS BACKUP RESOURCES TO BE DESTROYED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          echo "Backup Vaults:"
          aws backup list-backup-vaults \
            --region ${{ env.AWS_REGION }} \
            --query 'BackupVaultList[*].[BackupVaultName,NumberOfRecoveryPoints]' \
            --output table || echo "  None found"
          
          echo ""
          echo "Backup Plans:"
          aws backup list-backup-plans \
            --region ${{ env.AWS_REGION }} \
            --query 'BackupPlansList[*].[BackupPlanName,BackupPlanId]' \
            --output table || echo "  None found"
          
          echo ""
          echo "IAM Backup Roles:"
          aws iam list-roles \
            --query 'Roles[?contains(RoleName, `backup`)].RoleName' \
            --output table || echo "  None found"
      
      - name: 🗑️ Delete All Recovery Points
        continue-on-error: true
        run: |
          echo "🗑️ Deleting all recovery points from backup vault..."
          
          VAULT_NAME="tx01-backup-vault-${{ github.event.inputs.environment }}"
          
          # List all recovery points
          RECOVERY_POINTS=$(aws backup list-recovery-points-by-backup-vault \
            --backup-vault-name $VAULT_NAME \
            --region ${{ env.AWS_REGION }} \
            --query 'RecoveryPoints[].RecoveryPointArn' \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$RECOVERY_POINTS" ]; then
            for RP_ARN in $RECOVERY_POINTS; do
              echo "  Deleting recovery point: $RP_ARN"
              aws backup delete-recovery-point \
                --backup-vault-name $VAULT_NAME \
                --recovery-point-arn $RP_ARN \
                --region ${{ env.AWS_REGION }} || true
            done
            
            echo "⏳ Waiting for recovery points deletion (60s)..."
            sleep 60
            echo "✅ Recovery points deleted"
          else
            echo "✅ No recovery points found"
          fi
      
      - name: 🗑️ Delete Backup Selections
        continue-on-error: true
        run: |
          echo "🗑️ Deleting backup selections..."
          
          BACKUP_PLAN_ID=$(aws backup list-backup-plans \
            --region ${{ env.AWS_REGION }} \
            --query "BackupPlansList[?BackupPlanName=='tx01-daily-backup-${{ github.event.inputs.environment }}'].BackupPlanId" \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$BACKUP_PLAN_ID" ] && [ "$BACKUP_PLAN_ID" != "None" ]; then
            echo "Found backup plan: $BACKUP_PLAN_ID"
            
            # List and delete backup selections
            SELECTIONS=$(aws backup list-backup-selections \
              --backup-plan-id $BACKUP_PLAN_ID \
              --region ${{ env.AWS_REGION }} \
              --query 'BackupSelectionsList[].SelectionId' \
              --output text 2>/dev/null || echo "")
            
            if [ -n "$SELECTIONS" ]; then
              for SELECTION_ID in $SELECTIONS; do
                echo "  Deleting backup selection: $SELECTION_ID"
                aws backup delete-backup-selection \
                  --backup-plan-id $BACKUP_PLAN_ID \
                  --selection-id $SELECTION_ID \
                  --region ${{ env.AWS_REGION }} || true
              done
              echo "✅ Backup selections deleted"
            else
              echo "✅ No backup selections found"
            fi
          else
            echo "✅ No backup plan found"
          fi
      
      - name: 🗑️ Delete Backup Plan
        continue-on-error: true
        run: |
          echo "🗑️ Deleting backup plan..."
          
          BACKUP_PLAN_ID=$(aws backup list-backup-plans \
            --region ${{ env.AWS_REGION }} \
            --query "BackupPlansList[?BackupPlanName=='tx01-daily-backup-${{ github.event.inputs.environment }}'].BackupPlanId" \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$BACKUP_PLAN_ID" ] && [ "$BACKUP_PLAN_ID" != "None" ]; then
            echo "  Deleting backup plan: $BACKUP_PLAN_ID"
            aws backup delete-backup-plan \
              --backup-plan-id $BACKUP_PLAN_ID \
              --region ${{ env.AWS_REGION }} || true
            echo "✅ Backup plan deleted"
          else
            echo "✅ No backup plan found"
          fi
      
      - name: 🗑️ Delete Backup Vault
        continue-on-error: true
        run: |
          echo "🗑️ Deleting backup vault..."
          
          VAULT_NAME="tx01-backup-vault-${{ github.event.inputs.environment }}"
          
          if aws backup describe-backup-vault --backup-vault-name $VAULT_NAME --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "  Deleting vault: $VAULT_NAME"
            aws backup delete-backup-vault \
              --backup-vault-name $VAULT_NAME \
              --region ${{ env.AWS_REGION }} || true
            echo "✅ Backup vault deleted"
          else
            echo "✅ Backup vault not found"
          fi
      
      - name: 🗑️ Delete IAM Backup Role
        continue-on-error: true
        run: |
          echo "🗑️ Deleting IAM backup role..."
          
          ROLE_NAME="tx01-backup-role-${{ github.event.inputs.environment }}"
          
          if aws iam get-role --role-name $ROLE_NAME 2>/dev/null; then
            echo "Found IAM role: $ROLE_NAME"
            
            # List and detach managed policies
            echo "  Detaching managed policies..."
            aws iam list-attached-role-policies \
              --role-name $ROLE_NAME \
              --query 'AttachedPolicies[].PolicyArn' \
              --output text | while read policy_arn; do
                if [ -n "$policy_arn" ]; then
                  echo "    - Detaching: $policy_arn"
                  aws iam detach-role-policy \
                    --role-name $ROLE_NAME \
                    --policy-arn $policy_arn || true
                fi
              done
            
            # List and delete inline policies
            echo "  Deleting inline policies..."
            aws iam list-role-policies \
              --role-name $ROLE_NAME \
              --query 'PolicyNames[]' \
              --output text | while read policy_name; do
                if [ -n "$policy_name" ]; then
                  echo "    - Deleting: $policy_name"
                  aws iam delete-role-policy \
                    --role-name $ROLE_NAME \
                    --policy-name $policy_name || true
                fi
              done
            
            # Delete the role
            echo "  Deleting role: $ROLE_NAME"
            aws iam delete-role --role-name $ROLE_NAME || true
            echo "✅ IAM backup role deleted"
          else
            echo "✅ IAM backup role not found"
          fi
      
      - name: 📊 Backup Cleanup Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ AWS BACKUP INFRASTRUCTURE DESTROYED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Remaining backup resources:"
          aws backup list-backup-vaults \
            --region ${{ env.AWS_REGION }} \
            --query 'BackupVaultList[*].[BackupVaultName,NumberOfRecoveryPoints]' \
            --output table || echo "  ✅ No backup vaults found"

  destroy-kubernetes-resources:
    name: 🗑️ Clean Kubernetes Resources
    needs: [validate-confirmation, destroy-backup-infrastructure]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: 🔧 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: ☸️ Configure kubectl
        run: |
          echo "☸️ Checking if EKS cluster exists..."
          if aws eks describe-cluster --name tx01-eks-${{ github.event.inputs.environment }} --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "✅ Cluster exists, configuring kubectl..."
            aws eks update-kubeconfig \
              --name tx01-eks-${{ github.event.inputs.environment }} \
              --region ${{ env.AWS_REGION }}
          else
            echo "⚠️  EKS cluster not found, skipping kubectl configuration"
            exit 0
          fi
      
      - name: 🗑️ Delete All LoadBalancer Services
        continue-on-error: true
        run: |
          echo "🗑️ Deleting all LoadBalancer services (to remove ALBs/NLBs)..."
          
          # Delete LoadBalancer services in all namespaces
          kubectl get svc -A -o json | \
            jq -r '.items[] | select(.spec.type=="LoadBalancer") | "\(.metadata.namespace) \(.metadata.name)"' | \
            while read namespace name; do
              echo "  Deleting LoadBalancer: $namespace/$name"
              kubectl delete svc -n $namespace $name --timeout=60s || true
            done
          
          echo "⏳ Waiting 60s for AWS to process deletions..."
          sleep 60
          
          echo "✅ LoadBalancer services deleted"
      
      - name: 🗑️ Delete Ingress Resources
        continue-on-error: true
        run: |
          echo "🗑️ Deleting all Ingress resources..."
          kubectl delete ingress --all -A --timeout=60s || true
          sleep 30
          echo "✅ Ingress resources deleted"
      
      - name: 🗑️ Delete Persistent Volume Claims
        continue-on-error: true
        run: |
          echo "🗑️ Deleting all PVCs (will delete EBS volumes)..."
          kubectl delete pvc --all -A --timeout=120s || true
          sleep 30
          echo "✅ PVCs deleted"
      
      - name: 🗑️ Delete Monitoring Namespace
        continue-on-error: true
        run: |
          echo "🗑️ Deleting monitoring namespace..."
          kubectl delete namespace monitoring --timeout=120s || true
          echo "✅ Monitoring namespace deleted"

  destroy-terraform-resources:
    name: 🗑️ Destroy Terraform Infrastructure
    needs: destroy-kubernetes-resources
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: 🔧 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: 🔄 Terraform Init
        run: |
          cd terraform/${{ github.event.inputs.environment }}
          terraform init
      
      - name: 🗑️ Terraform Destroy
        run: |
          cd terraform/${{ github.event.inputs.environment }}
          
          echo "🗑️ Running terraform destroy..."
          echo ""
          
          terraform destroy -auto-approve \
            -var="environment=${{ github.event.inputs.environment }}" \
            || echo "⚠️  Some resources may have failed to destroy (will clean up manually)"
      
      - name: 🧹 Force Delete Auto Scaling Groups
        continue-on-error: true
        run: |
          echo "🧹 Force deleting Auto Scaling Groups..."
          
          # Find all ASGs with tx01 in the name
          aws autoscaling describe-auto-scaling-groups \
            --region ${{ env.AWS_REGION }} \
            --query 'AutoScalingGroups[?contains(AutoScalingGroupName, `tx01`)].AutoScalingGroupName' \
            --output text | while read asg_name; do
              if [ -n "$asg_name" ]; then
                echo "  Deleting ASG: $asg_name"
                
                # Force delete (terminates all instances)
                aws autoscaling delete-auto-scaling-group \
                  --auto-scaling-group-name "$asg_name" \
                  --force-delete \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
          
          echo "⏳ Waiting 60s for ASG instances to terminate..."
          sleep 60
      
      - name: 🧹 Clean Orphaned EKS Resources
        continue-on-error: true
        run: |
          echo "🧹 Cleaning orphaned EKS node groups..."
          
          CLUSTER_NAME="tx01-eks-${{ github.event.inputs.environment }}"
          
          # Check if cluster still exists
          if aws eks describe-cluster --name $CLUSTER_NAME --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Cluster found, proceeding with deletion..."
            
            # Delete node groups first
            echo "Deleting node groups..."
            aws eks list-nodegroups \
              --cluster-name $CLUSTER_NAME \
              --region ${{ env.AWS_REGION }} \
              --query 'nodegroups[]' \
              --output text | while read nodegroup; do
                if [ -n "$nodegroup" ]; then
                  echo "  Deleting nodegroup: $nodegroup"
                  aws eks delete-nodegroup \
                    --cluster-name $CLUSTER_NAME \
                    --nodegroup-name $nodegroup \
                    --region ${{ env.AWS_REGION }} || true
                fi
              done
            
            echo "⏳ Waiting for nodegroups to be deleted..."
            for i in {1..30}; do
              NODEGROUPS=$(aws eks list-nodegroups \
                --cluster-name $CLUSTER_NAME \
                --region ${{ env.AWS_REGION }} \
                --query 'nodegroups[]' \
                --output text 2>/dev/null || echo "")
              
              if [ -z "$NODEGROUPS" ]; then
                echo "✅ All nodegroups deleted"
                break
              fi
              
              echo "  Still waiting... ($i/30)"
              sleep 30
            done
            
            # Delete addons
            echo "Deleting EKS addons..."
            aws eks list-addons \
              --cluster-name $CLUSTER_NAME \
              --region ${{ env.AWS_REGION }} \
              --query 'addons[]' \
              --output text | while read addon; do
                if [ -n "$addon" ]; then
                  echo "  Deleting addon: $addon"
                  aws eks delete-addon \
                    --cluster-name $CLUSTER_NAME \
                    --addon-name $addon \
                    --region ${{ env.AWS_REGION }} || true
                fi
              done
            
            sleep 60
            
            # Delete cluster
            echo "Deleting EKS cluster..."
            aws eks delete-cluster \
              --name $CLUSTER_NAME \
              --region ${{ env.AWS_REGION }} || true
            
            echo "⏳ Waiting for cluster deletion (max 15 min)..."
            for i in {1..30}; do
              if ! aws eks describe-cluster --name $CLUSTER_NAME --region ${{ env.AWS_REGION }} 2>/dev/null; then
                echo "✅ Cluster deleted successfully"
                break
              fi
              echo "  Still waiting... ($i/30)"
              sleep 30
            done
          else
            echo "✅ EKS cluster already deleted"
          fi
      
      - name: 🧹 Clean Orphaned RDS Instances
        continue-on-error: true
        run: |
          echo "🧹 Cleaning orphaned RDS instances..."
          
          # Find RDS instances with tx01 prefix
          RDS_INSTANCES=$(aws rds describe-db-instances \
            --region ${{ env.AWS_REGION }} \
            --query "DBInstances[?contains(DBInstanceIdentifier, 'tx01-') && contains(DBInstanceIdentifier, '-${{ github.event.inputs.environment }}')].DBInstanceIdentifier" \
            --output text)
          
          if [ -n "$RDS_INSTANCES" ]; then
            for DB_NAME in $RDS_INSTANCES; do
              echo "Deleting RDS instance: $DB_NAME"
              
              # Delete without final snapshot (destructive!)
              aws rds delete-db-instance \
                --db-instance-identifier $DB_NAME \
                --skip-final-snapshot \
                --delete-automated-backups \
                --region ${{ env.AWS_REGION }} || true
            done
            
            echo "⏳ Waiting for RDS deletion..."
            sleep 60
          else
            echo "✅ No RDS instances found to delete"
          fi
      
      - name: 🧹 Clean Orphaned Load Balancers
        continue-on-error: true
        run: |
          echo "🧹 Cleaning orphaned load balancers..."
          
          # Find ALBs with tx01 or k8s tags
          aws elbv2 describe-load-balancers \
            --region ${{ env.AWS_REGION }} \
            --query 'LoadBalancers[?contains(LoadBalancerName, `tx01`) || contains(LoadBalancerName, `k8s`)].LoadBalancerArn' \
            --output text | while read alb_arn; do
              if [ -n "$alb_arn" ]; then
                echo "  Deleting ALB: $alb_arn"
                aws elbv2 delete-load-balancer \
                  --load-balancer-arn $alb_arn \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
          
          sleep 30
          echo "✅ Load balancers cleaned"
      
      - name: 🧹 Clean Orphaned Target Groups
        continue-on-error: true
        run: |
          echo "🧹 Cleaning orphaned target groups..."
          
          aws elbv2 describe-target-groups \
            --region ${{ env.AWS_REGION }} \
            --query 'TargetGroups[?contains(TargetGroupName, `tx01`) || contains(TargetGroupName, `k8s`)].TargetGroupArn' \
            --output text | while read tg_arn; do
              if [ -n "$tg_arn" ]; then
                echo "  Deleting Target Group: $tg_arn"
                aws elbv2 delete-target-group \
                  --target-group-arn $tg_arn \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
          
          echo "✅ Target groups cleaned"
      
      - name: 🧹 Terminate All EC2 Instances
        continue-on-error: true
        run: |
          echo "🧹 Terminating all EC2 instances..."
          
          # Find all instances with tx01 or eks tags
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:eks:cluster-name,Values=tx01-eks-${{ github.event.inputs.environment }}" \
            --query 'Reservations[].Instances[?State.Name!=`terminated`].InstanceId' \
            --output text \
            --region ${{ env.AWS_REGION }})
          
          if [ -n "$INSTANCE_IDS" ]; then
            echo "  Terminating instances: $INSTANCE_IDS"
            aws ec2 terminate-instances \
              --instance-ids $INSTANCE_IDS \
              --region ${{ env.AWS_REGION }} || true
            
            echo "⏳ Waiting for instances to terminate..."
            sleep 120
          else
            echo "✅ No instances to terminate"
          fi
      
      - name: 🧹 Delete Launch Templates
        continue-on-error: true
        run: |
          echo "🧹 Deleting launch templates..."
          
          aws ec2 describe-launch-templates \
            --filters "Name=tag:Project,Values=tx01" \
            --query 'LaunchTemplates[].LaunchTemplateId' \
            --output text \
            --region ${{ env.AWS_REGION }} | while read lt_id; do
              if [ -n "$lt_id" ]; then
                echo "  Deleting launch template: $lt_id"
                aws ec2 delete-launch-template \
                  --launch-template-id $lt_id \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
      
      - name: 🧹 Delete Network Interfaces
        continue-on-error: true
        run: |
          echo "🧹 Deleting orphaned network interfaces..."
          
          # Wait for instances to fully terminate
          sleep 60
          
          # Find available ENIs
          aws ec2 describe-network-interfaces \
            --filters "Name=status,Values=available" "Name=tag:cluster.k8s.amazonaws.com/name,Values=tx01-eks-${{ github.event.inputs.environment }}" \
            --query 'NetworkInterfaces[].NetworkInterfaceId' \
            --output text \
            --region ${{ env.AWS_REGION }} | while read eni_id; do
              if [ -n "$eni_id" ]; then
                echo "  Deleting ENI: $eni_id"
                aws ec2 delete-network-interface \
                  --network-interface-id $eni_id \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
          
          sleep 30
      
      - name: 🧹 Clean Orphaned Security Groups
        continue-on-error: true
        run: |
          echo "🧹 Cleaning orphaned security groups..."
          
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=tx01-vpc-${{ github.event.inputs.environment }}" \
            --query 'Vpcs[0].VpcId' \
            --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
          
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            echo "Found VPC: $VPC_ID"
            
            # Multiple passes to handle dependencies
            for pass in {1..3}; do
              echo "  Pass $pass/3..."
              
              # Remove all security group rules first
              aws ec2 describe-security-groups \
                --filters "Name=vpc-id,Values=$VPC_ID" \
                --query 'SecurityGroups[?GroupName!=`default`].GroupId' \
                --output text \
                --region ${{ env.AWS_REGION }} | while read sg_id; do
                  if [ -n "$sg_id" ]; then
                    echo "    Revoking rules for SG: $sg_id"
                    
                    # Revoke ingress rules
                    aws ec2 describe-security-groups \
                      --group-ids $sg_id \
                      --region ${{ env.AWS_REGION }} \
                      --query 'SecurityGroups[0].IpPermissions' \
                      --output json > /tmp/ingress_$sg_id.json 2>/dev/null || true
                    
                    if [ -s /tmp/ingress_$sg_id.json ] && [ "$(cat /tmp/ingress_$sg_id.json)" != "[]" ] && [ "$(cat /tmp/ingress_$sg_id.json)" != "null" ]; then
                      aws ec2 revoke-security-group-ingress \
                        --group-id $sg_id \
                        --ip-permissions file:///tmp/ingress_$sg_id.json \
                        --region ${{ env.AWS_REGION }} 2>/dev/null || true
                    fi
                    
                    # Revoke egress rules
                    aws ec2 describe-security-groups \
                      --group-ids $sg_id \
                      --region ${{ env.AWS_REGION }} \
                      --query 'SecurityGroups[0].IpPermissionsEgress' \
                      --output json > /tmp/egress_$sg_id.json 2>/dev/null || true
                    
                    if [ -s /tmp/egress_$sg_id.json ] && [ "$(cat /tmp/egress_$sg_id.json)" != "[]" ] && [ "$(cat /tmp/egress_$sg_id.json)" != "null" ]; then
                      aws ec2 revoke-security-group-egress \
                        --group-id $sg_id \
                        --ip-permissions file:///tmp/egress_$sg_id.json \
                        --region ${{ env.AWS_REGION }} 2>/dev/null || true
                    fi
                  fi
                done
              
              sleep 10
              
              # Delete security groups
              aws ec2 describe-security-groups \
                --filters "Name=vpc-id,Values=$VPC_ID" \
                --query 'SecurityGroups[?GroupName!=`default`].GroupId' \
                --output text \
                --region ${{ env.AWS_REGION }} | while read sg_id; do
                  if [ -n "$sg_id" ]; then
                    echo "    Deleting SG: $sg_id"
                    aws ec2 delete-security-group \
                      --group-id $sg_id \
                      --region ${{ env.AWS_REGION }} 2>/dev/null || true
                  fi
                done
              
              sleep 10
            done
          fi
          
          echo "✅ Security groups cleaned"
      
      - name: 🧹 Clean Orphaned NAT Gateways
        continue-on-error: true
        run: |
          echo "🧹 Cleaning orphaned NAT gateways..."
          
          aws ec2 describe-nat-gateways \
            --filter "Name=tag:Name,Values=*tx01*" \
            --query 'NatGateways[?State==`available`].NatGatewayId' \
            --output text \
            --region ${{ env.AWS_REGION }} | while read nat_id; do
              if [ -n "$nat_id" ]; then
                echo "  Deleting NAT Gateway: $nat_id"
                aws ec2 delete-nat-gateway \
                  --nat-gateway-id $nat_id \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
          
          echo "⏳ Waiting for NAT gateways deletion..."
          sleep 60
          
          echo "✅ NAT gateways cleaned"
      
      - name: 🧹 Release Elastic IPs
        continue-on-error: true
        run: |
          echo "🧹 Releasing Elastic IPs..."
          
          aws ec2 describe-addresses \
            --filters "Name=tag:Name,Values=*tx01*" \
            --query 'Addresses[].AllocationId' \
            --output text \
            --region ${{ env.AWS_REGION }} | while read eip_id; do
              if [ -n "$eip_id" ]; then
                echo "  Releasing EIP: $eip_id"
                aws ec2 release-address \
                  --allocation-id $eip_id \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
          
          echo "✅ Elastic IPs released"
      
      - name: 🧹 Clean Orphaned EBS Volumes
        continue-on-error: true
        run: |
          echo "🧹 Cleaning orphaned EBS volumes..."
          
          aws ec2 describe-volumes \
            --filters "Name=tag:Name,Values=*tx01*" "Name=status,Values=available" \
            --query 'Volumes[].VolumeId' \
            --output text \
            --region ${{ env.AWS_REGION }} | while read vol_id; do
              if [ -n "$vol_id" ]; then
                echo "  Deleting volume: $vol_id"
                aws ec2 delete-volume \
                  --volume-id $vol_id \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
          
          echo "✅ EBS volumes cleaned"
      
      - name: 🧹 Delete VPC
        continue-on-error: true
        run: |
          echo "🧹 Deleting VPC..."
          
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=tx01-vpc-${{ github.event.inputs.environment }}" \
            --query 'Vpcs[0].VpcId' \
            --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
          
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            echo "Deleting VPC: $VPC_ID"
            
            # Delete subnets
            echo "  Deleting subnets..."
            aws ec2 describe-subnets \
              --filters "Name=vpc-id,Values=$VPC_ID" \
              --query 'Subnets[].SubnetId' \
              --output text \
              --region ${{ env.AWS_REGION }} | while read subnet_id; do
                if [ -n "$subnet_id" ]; then
                  echo "    Subnet: $subnet_id"
                  aws ec2 delete-subnet \
                    --subnet-id $subnet_id \
                    --region ${{ env.AWS_REGION }} || true
                fi
              done
            
            sleep 10
            
            # Delete route tables
            echo "  Deleting route tables..."
            aws ec2 describe-route-tables \
              --filters "Name=vpc-id,Values=$VPC_ID" \
              --query 'RouteTables[?Associations[0].Main!=`true`].RouteTableId' \
              --output text \
              --region ${{ env.AWS_REGION }} | while read rt_id; do
                if [ -n "$rt_id" ]; then
                  echo "    Route table: $rt_id"
                  aws ec2 delete-route-table \
                    --route-table-id $rt_id \
                    --region ${{ env.AWS_REGION }} || true
                fi
              done
            
            sleep 10
            
            # Delete internet gateway
            echo "  Deleting internet gateways..."
            aws ec2 describe-internet-gateways \
              --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
              --query 'InternetGateways[].InternetGatewayId' \
              --output text \
              --region ${{ env.AWS_REGION }} | while read igw_id; do
                if [ -n "$igw_id" ]; then
                  echo "    IGW: $igw_id"
                  aws ec2 detach-internet-gateway \
                    --internet-gateway-id $igw_id \
                    --vpc-id $VPC_ID \
                    --region ${{ env.AWS_REGION }} || true
                  aws ec2 delete-internet-gateway \
                    --internet-gateway-id $igw_id \
                    --region ${{ env.AWS_REGION }} || true
                fi
              done
            
            sleep 10
            
            # Finally delete VPC
            echo "  Deleting VPC: $VPC_ID"
            aws ec2 delete-vpc \
              --vpc-id $VPC_ID \
              --region ${{ env.AWS_REGION }} || true
          fi
          
          echo "✅ VPC cleaned"
      
      - name: 🧹 Delete CloudWatch Log Groups
        continue-on-error: true
        run: |
          echo "🧹 Deleting CloudWatch log groups..."
          
          aws logs describe-log-groups \
            --log-group-name-prefix "/aws/rds/instance/tx01-db-${{ github.event.inputs.environment }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'logGroups[].logGroupName' \
            --output text | while read log_group; do
              if [ -n "$log_group" ]; then
                echo "  Deleting log group: $log_group"
                aws logs delete-log-group \
                  --log-group-name "$log_group" \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
          
          aws logs describe-log-groups \
            --log-group-name-prefix "/aws/eks/tx01-eks-${{ github.event.inputs.environment }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'logGroups[].logGroupName' \
            --output text | while read log_group; do
              if [ -n "$log_group" ]; then
                echo "  Deleting log group: $log_group"
                aws logs delete-log-group \
                  --log-group-name "$log_group" \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
          
          # Delete EC2 log groups
          aws logs describe-log-groups \
            --log-group-name-prefix "/aws/ec2/tx01-${{ github.event.inputs.environment }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'logGroups[].logGroupName' \
            --output text | while read log_group; do
              if [ -n "$log_group" ]; then
                echo "  Deleting log group: $log_group"
                aws logs delete-log-group \
                  --log-group-name "$log_group" \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
          
          # Delete WAF log groups
          aws logs describe-log-groups \
            --log-group-name-prefix "/aws/waf/tx01-${{ github.event.inputs.environment }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'logGroups[].logGroupName' \
            --output text | while read log_group; do
              if [ -n "$log_group" ]; then
                echo "  Deleting log group: $log_group"
                aws logs delete-log-group \
                  --log-group-name "$log_group" \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
      
      - name: 🧹 Delete Secrets Manager Secrets
        continue-on-error: true
        run: |
          echo "🧹 Deleting Secrets Manager secrets..."
          
          aws secretsmanager list-secrets \
            --region ${{ env.AWS_REGION }} \
            --query 'SecretList[?contains(Name, `tx01`)].Name' \
            --output text | while read secret_name; do
              if [ -n "$secret_name" ]; then
                echo "  Deleting secret: $secret_name"
                aws secretsmanager delete-secret \
                  --secret-id "$secret_name" \
                  --force-delete-without-recovery \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
      
      - name: 🧹 Delete RDS Snapshots
        continue-on-error: true
        run: |
          echo "🧹 Deleting RDS snapshots..."
          
          aws rds describe-db-snapshots \
            --query 'DBSnapshots[?contains(DBInstanceIdentifier, `tx01-db-${{ github.event.inputs.environment }}`)].DBSnapshotIdentifier' \
            --region ${{ env.AWS_REGION }} \
            --output text | while read snapshot_id; do
              if [ -n "$snapshot_id" ]; then
                echo "  Deleting snapshot: $snapshot_id"
                aws rds delete-db-snapshot \
                  --db-snapshot-identifier "$snapshot_id" \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done

  cleanup-ecr:
    name: 🗑️ Clean ECR Repositories
    needs: destroy-terraform-resources
    runs-on: ubuntu-latest
    if: github.event.inputs.preserve_ecr_images == 'false'
    steps:
      - name: 🔧 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🗑️ Delete ECR Repositories
        run: |
          echo "🗑️ Deleting ECR repositories..."
          
          aws ecr describe-repositories \
            --region ${{ env.AWS_REGION }} \
            --query 'repositories[?contains(repositoryName, `tx01`) || contains(repositoryName, `dx01`)].repositoryName' \
            --output text | while read repo_name; do
              if [ -n "$repo_name" ]; then
                echo "  Deleting repository: $repo_name"
                aws ecr delete-repository \
                  --repository-name $repo_name \
                  --force \
                  --region ${{ env.AWS_REGION }} || true
              fi
            done
          
          echo "✅ ECR repositories deleted"

  cleanup-iam:
    name: 🗑️ Clean IAM Resources
    needs: destroy-terraform-resources
    runs-on: ubuntu-latest
    steps:
      - name: 🔧 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🗑️ Delete EKS-related IAM Roles
        continue-on-error: true
        run: |
          echo "🗑️ Cleaning EKS-related IAM roles..."
          
          # List of IAM roles to delete
          ROLES=(
            "tx01-eks-cluster-role-${{ github.event.inputs.environment }}"
            "tx01-eks-node-role-${{ github.event.inputs.environment }}"
            "tx01-eks-ebs-csi-driver"
            "tx01-alb-controller-${{ github.event.inputs.environment }}"
          )
          
          for role in "${ROLES[@]}"; do
            if aws iam get-role --role-name $role 2>/dev/null; then
              echo "  Deleting role: $role"
              
              # Detach all policies
              aws iam list-attached-role-policies \
                --role-name $role \
                --query 'AttachedPolicies[].PolicyArn' \
                --output text | while read policy_arn; do
                  echo "    Detaching policy: $policy_arn"
                  aws iam detach-role-policy \
                    --role-name $role \
                    --policy-arn $policy_arn || true
                done
              
              # Delete inline policies
              aws iam list-role-policies \
                --role-name $role \
                --query 'PolicyNames[]' \
                --output text | while read policy_name; do
                  echo "    Deleting inline policy: $policy_name"
                  aws iam delete-role-policy \
                    --role-name $role \
                    --policy-name $policy_name || true
                done
              
              # Delete role
              aws iam delete-role --role-name $role || true
            fi
          done
          
          echo "✅ IAM roles cleaned"

  destroy-bootstrap:
    name: ⚠️ Destroy Terraform Bootstrap (S3 + DynamoDB)
    needs: [destroy-terraform-resources, cleanup-ecr, cleanup-iam]
    if: github.event.inputs.destroy_bootstrap == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🔧 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: ⚠️ Final Warning
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  FINAL WARNING - BOOTSTRAP DESTRUCTION ⚠️"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🔥 About to destroy Terraform backend infrastructure:"
          echo ""
          echo "   📦 S3 Bucket: tx01-terraform-state-maringelix-2025"
          echo "   🔒 DynamoDB Table: tx01-terraform-state-maringelix-2025-locks"
          echo ""
          echo "⚠️  THIS ACTION CANNOT BE UNDONE!"
          echo "⚠️  All Terraform state will be PERMANENTLY LOST!"
          echo "⚠️  You will need to run terraform-bootstrap again to recreate!"
          echo ""
          echo "⏳ Proceeding in 10 seconds..."
          sleep 10
      
      - name: 🗑️ Empty S3 Bucket
        run: |
          echo "🗑️ Emptying S3 bucket..."
          
          BUCKET_NAME="tx01-terraform-state-maringelix-2025"
          
          if aws s3api head-bucket --bucket $BUCKET_NAME 2>/dev/null; then
            echo "Found bucket: $BUCKET_NAME"
            
            # Check if bucket has versioning
            VERSIONING=$(aws s3api get-bucket-versioning --bucket $BUCKET_NAME --query 'Status' --output text 2>/dev/null || echo "")
            
            if [ "$VERSIONING" = "Enabled" ]; then
              echo "  ⚠️  Bucket has versioning enabled, deleting all versions..."
              
              # Delete all versions and delete markers
              aws s3api list-object-versions \
                --bucket $BUCKET_NAME \
                --output json | \
              jq -r '.Versions[]?, .DeleteMarkers[]? | "\(.Key) \(.VersionId)"' | \
              while read key version_id; do
                if [ -n "$key" ] && [ -n "$version_id" ]; then
                  echo "    - Deleting: $key (version: $version_id)"
                  aws s3api delete-object \
                    --bucket $BUCKET_NAME \
                    --key "$key" \
                    --version-id "$version_id" || true
                fi
              done
            else
              echo "  Deleting all objects..."
              aws s3 rm s3://$BUCKET_NAME --recursive || true
            fi
            
            echo "✅ S3 bucket emptied"
          else
            echo "⚠️  S3 bucket not found or already deleted"
          fi
      
      - name: 🗑️ Delete S3 Bucket
        run: |
          echo "🗑️ Deleting S3 bucket..."
          
          BUCKET_NAME="tx01-terraform-state-maringelix-2025"
          
          if aws s3api head-bucket --bucket $BUCKET_NAME 2>/dev/null; then
            echo "  Deleting bucket: $BUCKET_NAME"
            aws s3api delete-bucket \
              --bucket $BUCKET_NAME \
              --region ${{ env.AWS_REGION }} || true
            echo "✅ S3 bucket deleted"
          else
            echo "✅ S3 bucket already deleted"
          fi
      
      - name: 🗑️ Delete DynamoDB Table
        run: |
          echo "🗑️ Deleting DynamoDB table..."
          
          TABLE_NAME="tx01-terraform-state-maringelix-2025-locks"
          
          if aws dynamodb describe-table --table-name $TABLE_NAME --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "  Deleting table: $TABLE_NAME"
            aws dynamodb delete-table \
              --table-name $TABLE_NAME \
              --region ${{ env.AWS_REGION }} || true
            
            echo "⏳ Waiting for table deletion..."
            aws dynamodb wait table-not-exists \
              --table-name $TABLE_NAME \
              --region ${{ env.AWS_REGION }} || true
            
            echo "✅ DynamoDB table deleted"
          else
            echo "✅ DynamoDB table already deleted"
          fi
      
      - name: 📊 Bootstrap Destruction Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ TERRAFORM BOOTSTRAP DESTROYED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🔍 Verifying deletion..."
          echo ""
          
          echo "S3 Buckets with 'tx01':"
          aws s3 ls | grep tx01 || echo "  ✅ None found"
          
          echo ""
          echo "DynamoDB Tables with 'tx01':"
          aws dynamodb list-tables \
            --query 'TableNames[?contains(@, `tx01`)]' \
            --output table || echo "  ✅ None found"
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  ALL TERRAFORM STATE HAS BEEN DESTROYED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "ℹ️  To recreate the infrastructure, you must:"
          echo "   1. Run: .github/workflows/terraform-bootstrap.yml"
          echo "   2. Then run: .github/workflows/terraform-apply.yml"

  final-report:
    name: 📋 Destruction Report
    needs: [destroy-kubernetes-resources, destroy-terraform-resources, cleanup-ecr, cleanup-iam, destroy-bootstrap]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 🔧 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
