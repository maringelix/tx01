name: 🔧 Scale EKS Nodes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - stg
          - prd
      instance_type:
        description: 'Node Instance Type'
        required: true
        type: choice
        default: 't3.large'
        options:
          - t3.medium
          - t3.large
          - t3.xlarge
      desired_size:
        description: 'Desired Number of Nodes'
        required: true
        type: number
        default: 2

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0

permissions:
  contents: read
  id-token: write

jobs:
  scale-eks-nodes:
    name: 🔧 Scale EKS Nodes to ${{ github.event.inputs.instance_type }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: 🔧 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🏗️ Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: 📊 Current EKS Node Group Status
        run: |
          echo "📊 Checking current EKS node group configuration..."
          aws eks describe-nodegroup \
            --cluster-name tx01-eks-${{ github.event.inputs.environment }} \
            --nodegroup-name tx01-ng-${{ github.event.inputs.environment }} \
            --region ${{ env.AWS_REGION }} \
            --query 'nodegroup.{InstanceType:instanceTypes[0],DesiredSize:scalingConfig.desiredSize,MinSize:scalingConfig.minSize,MaxSize:scalingConfig.maxSize}' \
            --output table
      
      - name: 🔄 Update Terraform Variables
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: |
          echo "🔄 Updating terraform.tfvars with new configuration..."
          
          # Update instance type
          sed -i "s/eks_node_instance_type  = \".*\"/eks_node_instance_type  = \"${{ github.event.inputs.instance_type }}\"/" terraform.tfvars
          
          # Update desired size
          sed -i "s/eks_node_desired_size   = .*/eks_node_desired_size   = ${{ github.event.inputs.desired_size }}/" terraform.tfvars
          
          echo "✅ terraform.tfvars updated:"
          grep -E "(eks_node_instance_type|eks_node_desired_size)" terraform.tfvars
      
      - name: 🔧 Terraform Init
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: |
          echo "🔧 Initializing Terraform..."
          terraform init
      
      - name: 📋 Terraform Plan
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: |
          echo "📋 Planning Terraform changes..."
          terraform plan -out=tfplan
      
      - name: 🔍 Review Terraform Plan
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: |
          echo "🔍 Reviewing Terraform plan before apply..."
          terraform show tfplan
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  TERRAFORM PLAN SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Extract key changes
          terraform show -json tfplan | jq -r '
            .resource_changes[] |
            select(.change.actions != ["no-op"]) |
            "[\(.change.actions | join(","))] \(.type).\(.name)"
          ' || echo "No changes detected"
          
          echo ""
          echo "✅ Plan review completed. Proceeding to apply..."
          
      - name: ⏸️ Manual Approval Required
        run: |
          echo "⏸️  Waiting 30 seconds for manual review..."
          echo "    If you need to cancel, stop the workflow now!"
          echo ""
          for i in {30..1}; do
            echo -ne "    Continuing in $i seconds...\r"
            sleep 1
          done
          echo ""
          echo "✅ Proceeding with apply..."
      
      - name: 🚀 Terraform Apply
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: |
          echo "🚀 Applying Terraform changes to scale EKS nodes..."
          terraform apply -auto-approve tfplan
      
      - name: ⏳ Wait for Node Group Update
        run: |
          echo "⏳ Waiting for node group to update..."
          
          MAX_WAIT=900  # 15 minutes
          ELAPSED=0
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(aws eks describe-nodegroup \
              --cluster-name tx01-eks-${{ github.event.inputs.environment }} \
              --nodegroup-name tx01-ng-${{ github.event.inputs.environment }} \
              --region ${{ env.AWS_REGION }} \
              --query 'nodegroup.status' \
              --output text)
            
            echo "Node group status: $STATUS (${ELAPSED}s elapsed)"
            
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "✅ Node group is ACTIVE"
              break
            fi
            
            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done
          
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "❌ Timeout waiting for node group to become ACTIVE"
            exit 1
          fi
      
      - name: ☸️ Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name tx01-eks-${{ github.event.inputs.environment }} \
            --region ${{ env.AWS_REGION }}
      
      - name: 🔍 Verify New Nodes
        run: |
          echo "🔍 Verifying new nodes are ready..."
          kubectl get nodes -o wide
          
          echo ""
          echo "📊 Node resources:"
          kubectl top nodes || echo "⚠️ Metrics server not available yet"
          
          echo ""
          echo "📦 Pods distribution:"
          kubectl get pods --all-namespaces -o wide | awk '{print $8}' | sort | uniq -c
      
      - name: 🧹 Clean Old Pending Pods
        run: |
          echo "🧹 Cleaning up old pending pods..."
          
          # Delete pending pods older than 5 minutes
          kubectl get pods --all-namespaces --field-selector status.phase=Pending -o json | \
            jq -r '.items[] | select(.metadata.creationTimestamp | fromdateiso8601 < (now - 300)) | "\(.metadata.namespace) \(.metadata.name)"' | \
            while read ns pod; do
              echo "Deleting pending pod: $ns/$pod"
              kubectl delete pod $pod -n $ns --force --grace-period=0 || true
            done
          
          echo ""
          echo "✅ Cleanup completed"
      
      - name: 📊 Commit Updated terraform.tfvars
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add terraform/${{ github.event.inputs.environment }}/terraform.tfvars
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: scale EKS nodes to ${{ github.event.inputs.instance_type }} (desired: ${{ github.event.inputs.desired_size }})"
            git push
          fi
      
      - name: 🎯 Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ EKS NODES SCALED SUCCESSFULLY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📊 New Configuration:"
          echo "   Instance Type: ${{ github.event.inputs.instance_type }}"
          echo "   Desired Nodes: ${{ github.event.inputs.desired_size }}"
          echo ""
          echo "🔍 Verify nodes:"
          echo "   kubectl get nodes -o wide"
          echo ""
          echo "📦 Check pod status:"
          echo "   kubectl get pods --all-namespaces"
          echo ""
          echo "💡 Next steps:"
          echo "   • Pods should now have enough resources"
          echo "   • Pending pods will be scheduled automatically"
          echo "   • You can now redeploy Gatekeeper and observability stack"
